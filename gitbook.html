    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function normalizeDoc(doc) {
        let clean = String(doc || "README.md").replace(/\\/g, "/").replace(/^\/+/, "");
        if (clean === "LICENSE") {
            clean = "LICENSE.txt";
        }
        if (clean === "NOTICE") {
            clean = "NOTICE.txt";
        }
        if (clean.includes("..")) {
            return "README.md";
        }
        return clean;
    }

    function docUrl(doc) {
        return "gitbook.html?doc=" + encodeURIComponent(normalizeDoc(doc));
    }

    function isReadableDoc(href) {
        return href && (
            /\.md($|#)/i.test(href) ||
            /\.txt($|#)/i.test(href) ||
            /\.html?($|#)/i.test(href) ||
            /\.yaml($|#)/i.test(href) ||
            /\.yml($|#)/i.test(href) ||
            /\.json($|#)/i.test(href) ||
            href === "LICENSE" ||
            href === "NOTICE"
        );
    }

    function inlineMarkdown(text) {
        let html = escapeHtml(text);
        html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
        html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
        html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function (_, alt, src) {
            return `<img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}">`;
        });
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, label, href) {
            const safeHref = escapeHtml(href);
            const target = isReadableDoc(href) ? docUrl(href) : safeHref;
            return `<a href="${target}" data-doc-link="${escapeHtml(href)}">${label}</a>`;
        });
        return html;
    }

    function renderTable(lines) {
        const rows = lines.map(line => line.trim().replace(/^\||\|$/g, "").split("|").map(cell => inlineMarkdown(cell.trim())));
        const head = rows.shift() || [];
        if (rows.length && rows[0].every(cell => /^:?-{3,}:?$/.test(cell.replace(/<[^>]+>/g, "")))) {
            rows.shift();
        }
        return "<table><thead><tr>" + head.map(cell => `<th>${cell}</th>`).join("") +
            "</tr></thead><tbody>" + rows.map(row => "<tr>" + row.map(cell => `<td>${cell}</td>`).join("") + "</tr>").join("") +
            "</tbody></table>";
    }

    function renderMarkdown(markdown) {
        const lines = String(markdown || "").replace(/\r\n/g, "\n").split("\n");
        const html = [];
        let paragraph = [];
        let list = [];
        let table = [];
        let inCode = false;
        let code = [];
        let codeLang = "";

        function flushParagraph() {
            if (paragraph.length) {
                html.push("<p>" + inlineMarkdown(paragraph.join(" ")) + "</p>");
                paragraph = [];
            }
        }

        function flushList() {
            if (list.length) {
                html.push("<ul>" + list.map(item => "<li>" + inlineMarkdown(item) + "</li>").join("") + "</ul>");
                list = [];
            }
        }

        function flushTable() {
            if (table.length) {
                html.push(renderTable(table));
                table = [];
            }
        }

        lines.forEach(line => {
            const trimmed = line.trim();

            if (trimmed.startsWith("```")) {
                flushParagraph();
                flushList();
                flushTable();
                if (inCode) {
                    if (codeLang.toLowerCase() === "mermaid") {
                        html.push(`<div class="mermaid">${escapeHtml(code.join("\n"))}</div>`);
                    } else {
                        html.push(`<pre><code class="language-${escapeHtml(codeLang)}">${escapeHtml(code.join("\n"))}</code></pre>`);
                    }
                    code = [];
                    codeLang = "";
                    inCode = false;
                } else {
                    inCode = true;
                    codeLang = trimmed.slice(3).trim();
                }
                return;
            }

            if (inCode) {
                code.push(line);
                return;
            }

            if (!trimmed) {
                flushParagraph();
                flushList();
                flushTable();
                return;
            }

            if (trimmed === "<details>") {
                flushParagraph();
                flushList();
                flushTable();
                html.push("<details>");
                return;
            }

            if (trimmed === "</details>") {
                flushParagraph();
                flushList();
                flushTable();
                html.push("</details>");
                return;
            }

            const summary = trimmed.match(/^<summary>(.+)<\/summary>$/i);
            if (summary) {
                flushParagraph();
                flushList();
                flushTable();
                const label = summary[1].replace(/<\/?strong>/gi, "");
                html.push(`<summary>${inlineMarkdown(label)}</summary>`);
                return;
            }

            if (/^\|.+\|$/.test(trimmed)) {
                flushParagraph();
                flushList();
                table.push(line);
                return;
            }

            flushTable();

            const heading = trimmed.match(/^(#{1,6})\s+(.+)$/);
            if (heading) {
                flushParagraph();
                flushList();
                const level = heading[1].length;
                html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
                return;
            }

            const bullet = trimmed.match(/^[-*]\s+(.+)$/);
            if (bullet) {
                flushParagraph();
                list.push(bullet[1]);
                return;
            }

            paragraph.push(trimmed);
        });

        flushParagraph();
        flushList();
        flushTable();

        if (inCode) {
            html.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
        }

        return html.join("\n");
    }

    function loadMermaidScript() {
        if (window.mermaid) {
            return Promise.resolve(window.mermaid);
        }

        if (window.__saqshiMermaidLoading) {
            return window.__saqshiMermaidLoading;
        }

        window.__saqshiMermaidLoading = new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js";
            script.onload = () => resolve(window.mermaid);
            script.onerror = () => reject(new Error("Mermaid renderer could not be loaded."));
            document.head.appendChild(script);
        });

        return window.__saqshiMermaidLoading;
    }

    async function renderMermaidDiagrams() {
        const diagrams = Array.from(content.querySelectorAll(".mermaid"));
        if (!diagrams.length) {
            return;
        }

        try {
            const mermaid = await loadMermaidScript();
            mermaid.initialize({
                startOnLoad: false,
                securityLevel: "loose",
                theme: "default",
                flowchart: { htmlLabels: true, useMaxWidth: false }
            });
            await mermaid.run({ nodes: diagrams });
            addDiagramDownloadControls();
        } catch (error) {
            diagrams.forEach(diagram => {
                const source = diagram.textContent || "";
                diagram.outerHTML = `<div class="mermaid-error"><strong>Diagram renderer unavailable.</strong><br>${escapeHtml(error.message)}<pre><code>${escapeHtml(source)}</code></pre></div>`;
            });
        }
    }

    function downloadBlob(filename, mime, text) {
        const blob = new Blob([text], { type: mime });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function filenameFromHeading(prefix, index, extension) {
        const heading = content.querySelector("h1");
        const base = (heading ? heading.textContent : prefix)
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, "") || prefix;
        return `${base}-${prefix}-${index + 1}.${extension}`;
    }

    function addDiagramDownloadControls() {
        content.querySelectorAll(".mermaid").forEach((diagram, index) => {
            if (diagram.dataset.downloadReady === "1") {
                return;
            }
            const svg = diagram.querySelector("svg");
            if (!svg) {
                return;
            }
            diagram.dataset.downloadReady = "1";
            const actions = document.createElement("div");
            actions.className = "diagram-actions";
            const button = document.createElement("button");
            button.type = "button";
            button.className = "diagram-download";
            button.textContent = "Download SVG";
            button.addEventListener("click", () => {
                const clone = svg.cloneNode(true);
                clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
                const source = new XMLSerializer().serializeToString(clone);
                downloadBlob(filenameFromHeading("diagram", index, "svg"), "image/svg+xml;charset=utf-8", source);
            });
            actions.appendChild(button);
            diagram.parentNode.insertBefore(actions, diagram);
        });

        content.querySelectorAll("img").forEach((image, index) => {
            if (image.dataset.downloadReady === "1") {
                return;
            }
            image.dataset.downloadReady = "1";
            const actions = document.createElement("div");
            actions.className = "diagram-actions";
            const link = document.createElement("a");
            link.className = "diagram-download";
            link.href = image.getAttribute("src");
            link.download = filenameFromHeading("image", index, "png");
            link.textContent = "Download Image";
            actions.appendChild(link);
            image.parentNode.insertBefore(actions, image);
        });
    }

    async function loadDoc(doc) {
        const normalized = normalizeDoc(doc);
        const activeUrl = docUrl(normalized);
        content.innerHTML = "<p>Loading documentation...</p>";

        document.querySelectorAll(".book-link").forEach(link => {
            link.classList.toggle("active", link.dataset.doc === normalized);
        });

        try {
            const ext = normalized.split(".").pop().toLowerCase();
            if (["html", "htm"].includes(ext)) {
                content.innerHTML = `<h1>${inlineMarkdown(normalized)}</h1><iframe class="book-html-frame" src="${escapeHtml(normalized)}" title="${escapeHtml(normalized)}"></iframe>`;
                history.replaceState(null, "", activeUrl);
                window.scrollTo({ top: 0, behavior: "smooth" });
                return;
            }

            const response = await fetch(normalized, { cache: "no-store" });
            if (!response.ok) {
                throw new Error("HTTP " + response.status);
            }
            const text = await response.text();
            if (["json", "yaml", "yml"].includes(ext)) {
                content.innerHTML = `<h1>${inlineMarkdown(normalized)}</h1><pre><code>${escapeHtml(text)}</code></pre>`;
            } else {
                content.innerHTML = renderMarkdown(text);
                await renderMermaidDiagrams();
                addDiagramDownloadControls();
            }
            history.replaceState(null, "", activeUrl);
            window.scrollTo({ top: 0, behavior: "smooth" });
        } catch (error) {
            content.innerHTML = `<div class="book-error"><strong>Unable to load document.</strong><br>${escapeHtml(normalized)}<br>${escapeHtml(error.message)}</div>`;
        }
    }

    function renderNav() {
        nav.innerHTML = groups.map(group => {
            const links = group.items.map(([label, doc]) => `<a class="book-link" href="${docUrl(doc)}" data-doc="${normalizeDoc(doc)}">${escapeHtml(label)}</a>`).join("");
            return `<div class="book-nav-group"><h3>${escapeHtml(group.title)}</h3>${links}</div>`;
        }).join("");
    }

    document.addEventListener("click", function (event) {
        const link = event.target.closest("a");
        if (!link) {
            return;
        }

        const href = link.getAttribute("href") || "";
        const doc = link.dataset.doc || link.dataset.docLink;

        if (doc) {
            event.preventDefault();
            loadDoc(doc);
            return;
        }

        if (href.startsWith("gitbook.html?doc=")) {
            event.preventDefault();
            const url = new URL(href, window.location.href);
            loadDoc(url.searchParams.get("doc"));
        }
    });

    renderNav();
    const params = new URLSearchParams(window.location.search);
    loadDoc(params.get("doc") || "README.md");
})();
</script>
</body>
</html>
