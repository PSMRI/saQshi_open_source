<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">SaQshi Infrastructure Architecture</title>
  <desc id="desc">Cloud and on-premise infrastructure architecture for SaQshi showing DNS, HTTPS, load balancer, web tier, database, storage, backups, monitoring and administrators.</desc>
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f2f57; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #52627a; }
      .label { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 13px Arial, sans-serif; fill: #1f2937; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #475569; }
      .num { font: 700 16px Arial, sans-serif; fill: #111827; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.4; }
      .soft { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; }
      .blue { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1.3; }
      .green { fill: #dcfce7; stroke: #86efac; stroke-width: 1.3; }
      .orange { fill: #ffedd5; stroke: #fdba74; stroke-width: 1.3; }
      .red { fill: #fee2e2; stroke: #f87171; stroke-width: 1.3; }
      .purple { fill: #ede9fe; stroke: #a78bfa; stroke-width: 1.3; }
      .line { stroke: #111827; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.4; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrowGrey); }
      .dashBox { fill: none; stroke: #94a3b8; stroke-width: 1.2; stroke-dasharray: 6 5; }
      .white { fill: #fff; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="arrowGrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1400" height="920" fill="#ffffff"/>
  <text x="700" y="34" text-anchor="middle" class="title">SaQshi Infrastructure Architecture</text>
  <text x="700" y="58" text-anchor="middle" class="subtitle">Recommended Cloud / Data Centre Deployment View</text>

  <!-- Users and DNS -->
  <g transform="translate(44,84)">
    <circle cx="28" cy="22" r="15" fill="#4b5563"/>
    <circle cx="68" cy="22" r="15" fill="#4b5563"/>
    <path d="M5 72 C8 48 48 48 52 72 Z" fill="#4b5563"/>
    <path d="M45 72 C48 48 88 48 92 72 Z" fill="#4b5563"/>
    <text x="48" y="100" text-anchor="middle" class="label">Users</text>
  </g>

  <rect x="265" y="84" width="170" height="70" rx="8" class="blue"/>
  <text x="350" y="112" text-anchor="middle" class="label">1 Domain / DNS</text>
  <text x="350" y="134" text-anchor="middle" class="small">{main_url}</text>

  <rect x="520" y="84" width="170" height="70" rx="8" class="blue"/>
  <text x="605" y="112" text-anchor="middle" class="label">2 HTTPS / TLS</text>
  <text x="605" y="134" text-anchor="middle" class="small">Certificate Manager</text>

  <!-- Region and network -->
  <rect x="160" y="190" width="1120" height="650" class="dashBox"/>
  <text x="184" y="216" class="label">Cloud Region / Data Centre</text>

  <rect x="205" y="240" width="1030" height="540" class="soft"/>
  <text x="230" y="266" class="label">3 VPC / Private Network</text>

  <!-- Public subnet -->
  <rect x="240" y="300" width="300" height="180" class="green"/>
  <text x="265" y="328" class="label">4 Public Subnet</text>
  <rect x="280" y="360" width="220" height="70" rx="6" class="blue"/>
  <text x="390" y="388" text-anchor="middle" class="label">Load Balancer / Reverse Proxy</text>
  <text x="390" y="410" text-anchor="middle" class="small">Nginx / Apache / IIS</text>

  <!-- Private app subnet -->
  <rect x="580" y="300" width="300" height="250" class="blue"/>
  <text x="605" y="328" class="label">5 Private App Subnet</text>
  <rect x="610" y="365" width="240" height="70" rx="6" class="box"/>
  <text x="730" y="392" text-anchor="middle" class="label">Web/App Server</text>
  <text x="730" y="414" text-anchor="middle" class="small">PHP + SaQshi api/ and ui/</text>
  <rect x="610" y="455" width="110" height="54" rx="4" class="soft"/>
  <text x="665" y="478" text-anchor="middle" class="small">Instance A</text>
  <text x="665" y="496" text-anchor="middle" class="tiny">optional HA</text>
  <rect x="740" y="455" width="110" height="54" rx="4" class="soft"/>
  <text x="795" y="478" text-anchor="middle" class="small">Instance B</text>
  <text x="795" y="496" text-anchor="middle" class="tiny">optional HA</text>

  <!-- Private data subnet -->
  <rect x="920" y="300" width="270" height="250" class="purple"/>
  <text x="945" y="328" class="label">6 Private Data Subnet</text>
  <ellipse cx="1055" cy="425" rx="80" ry="24" class="db"/>
  <rect x="975" y="370" width="160" height="55" class="db"/>
  <ellipse cx="1055" cy="370" rx="80" ry="24" class="db"/>
  <text x="1055" y="397" text-anchor="middle" class="label">Managed DB</text>
  <text x="1055" y="417" text-anchor="middle" class="small">MySQL / MariaDB</text>
  <rect x="975" y="465" width="160" height="55" rx="4" class="soft"/>
  <text x="1055" y="488" text-anchor="middle" class="label">7 DB Backup</text>
  <text x="1055" y="507" text-anchor="middle" class="small">Snapshots / PITR</text>

  <!-- Storage and logs -->
  <rect x="295" y="590" width="170" height="82" rx="6" class="orange"/>
  <text x="380" y="620" text-anchor="middle" class="label">8 Object Storage</text>
  <text x="380" y="642" text-anchor="middle" class="small">Uploads, evidence,</text>
  <text x="380" y="660" text-anchor="middle" class="small">certificates, reports</text>

  <rect x="515" y="590" width="170" height="82" rx="6" class="orange"/>
  <text x="600" y="620" text-anchor="middle" class="label">9 Backup Storage</text>
  <text x="600" y="642" text-anchor="middle" class="small">DB dumps, file</text>
  <text x="600" y="660" text-anchor="middle" class="small">backup archives</text>

  <rect x="735" y="590" width="170" height="82" rx="6" class="orange"/>
  <text x="820" y="620" text-anchor="middle" class="label">10 Logs / Monitoring</text>
  <text x="820" y="642" text-anchor="middle" class="small">App logs, events,</text>
  <text x="820" y="660" text-anchor="middle" class="small">alerts, metrics</text>

  <rect x="955" y="590" width="170" height="82" rx="6" class="orange"/>
  <text x="1040" y="620" text-anchor="middle" class="label">11 Optional Queue</text>
  <text x="1040" y="642" text-anchor="middle" class="small">Local events now,</text>
  <text x="1040" y="660" text-anchor="middle" class="small">Kafka/SQS later</text>

  <!-- Admin access -->
  <rect x="55" y="520" width="110" height="70" rx="6" class="soft"/>
  <text x="110" y="548" text-anchor="middle" class="label">Admins</text>
  <text x="110" y="570" text-anchor="middle" class="small">SSH/RDP/VPN</text>

  <rect x="55" y="625" width="110" height="92" rx="6" class="soft"/>
  <text x="110" y="650" text-anchor="middle" class="label">12 Security</text>
  <text x="110" y="672" text-anchor="middle" class="small">Firewall</text>
  <text x="110" y="690" text-anchor="middle" class="small">IAM / RBAC</text>
  <text x="110" y="708" text-anchor="middle" class="small">Secrets</text>

  <!-- Internet / integrations -->
  <ellipse cx="1320" cy="428" rx="48" ry="32" fill="#bfdbfe" stroke="#93c5fd"/>
  <text x="1320" y="435" text-anchor="middle" class="label">Internet</text>
  <rect x="1260" y="535" width="120" height="62" rx="4" class="red"/>
  <text x="1320" y="560" text-anchor="middle" class="label">External APIs</text>
  <text x="1320" y="580" text-anchor="middle" class="small">SMS, email, maps</text>

  <!-- Arrows -->
  <path d="M140 124 L265 124" class="line"/>
  <path d="M435 119 L520 119" class="line"/>
  <path d="M605 154 L605 210 L390 360" class="line"/>
  <path d="M500 395 L610 395" class="line"/>
  <path d="M850 400 L975 395" class="line"/>
  <path d="M730 435 L380 590" class="line"/>
  <path d="M1055 449 L600 590" class="line"/>
  <path d="M730 435 L820 590" class="line"/>
  <path d="M820 435 L1040 590" class="dash"/>
  <path d="M1190 425 L1270 425" class="dash"/>
  <path d="M1190 530 L1260 565" class="dash"/>
  <path d="M165 555 L610 480" class="dash"/>
  <path d="M165 670 L280 395" class="dash"/>

  <!-- Step list -->
  <rect x="1180" y="90" width="185" height="190" rx="6" class="box"/>
  <text x="1272" y="118" text-anchor="middle" class="label">Flow</text>
  <text x="1198" y="145" class="tiny">1 DNS resolves {main_url}</text>
  <text x="1198" y="166" class="tiny">2 TLS terminates securely</text>
  <text x="1198" y="187" class="tiny">3 Proxy routes to PHP app</text>
  <text x="1198" y="208" class="tiny">4 App reads DB/config/files</text>
  <text x="1198" y="229" class="tiny">5 Backups and logs retained</text>
  <text x="1198" y="250" class="tiny">6 Optional services integrate</text>

  <!-- Legend -->
  <rect x="90" y="850" width="1220" height="44" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="125" y="864" width="24" height="18" class="blue"/>
  <text x="160" y="878" class="tiny">Network / Compute</text>
  <rect x="320" y="864" width="24" height="18" class="purple"/>
  <text x="355" y="878" class="tiny">Private Data</text>
  <rect x="500" y="864" width="24" height="18" class="orange"/>
  <text x="535" y="878" class="tiny">Storage / Operations</text>
  <rect x="720" y="864" width="24" height="18" class="green"/>
  <text x="755" y="878" class="tiny">Public Entry</text>
  <line x1="930" y1="873" x2="980" y2="873" class="line"/>
  <text x="995" y="878" class="tiny">Primary Traffic</text>
  <line x1="1145" y1="873" x2="1195" y2="873" class="dash"/>
  <text x="1210" y="878" class="tiny">Admin / Optional</text>
</svg>
