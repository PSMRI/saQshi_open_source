<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">SaQshi Release and Deployment Architecture</title>
  <desc id="desc">SaQshi current deployment flow. Code moves from developer machine to Git, release validation, package creation, backup, server deployment and Dev UAT Production promotion.</desc>
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f2f57; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #52627a; }
      .section { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 13px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #475569; }
      .note { font: 700 13px Arial, sans-serif; fill: #1d4ed8; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.3; }
      .dashBox { fill: #ffffff; stroke: #2563eb; stroke-width: 2; stroke-dasharray: 9 7; }
      .blue { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1.4; }
      .green { fill: #dcfce7; stroke: #86efac; stroke-width: 1.4; }
      .orange { fill: #ffedd5; stroke: #fdba74; stroke-width: 1.4; }
      .purple { fill: #ede9fe; stroke: #a78bfa; stroke-width: 1.4; }
      .grey { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.3; }
      .dark { fill: #1e293b; stroke: #0f172a; stroke-width: 1.4; }
      .white { fill: #ffffff; font: 700 14px Arial, sans-serif; }
      .line { stroke: #111827; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .blueLine { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .greenLine { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .dashLine { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1400" height="760" fill="#ffffff"/>
  <text x="700" y="34" text-anchor="middle" class="title">SaQshi Release and Deployment Architecture</text>
  <text x="700" y="58" text-anchor="middle" class="subtitle">Current deployment model: PHP web application on IIS / Apache / Nginx with MySQL or MariaDB</text>

  <!-- Source and review -->
  <rect x="40" y="100" width="290" height="560" rx="14" class="dashBox"/>
  <text x="185" y="132" text-anchor="middle" class="section">1. Source Control</text>

  <rect x="75" y="180" width="220" height="86" rx="8" class="blue"/>
  <text x="185" y="210" text-anchor="middle" class="label">Developer Machine</text>
  <text x="185" y="234" text-anchor="middle" class="small">Code change in api/, ui/, docs/</text>
  <text x="185" y="254" text-anchor="middle" class="tiny">Commit and push</text>

  <rect x="75" y="330" width="220" height="92" rx="8" class="grey"/>
  <text x="185" y="360" text-anchor="middle" class="label">Git Repository</text>
  <text x="185" y="384" text-anchor="middle" class="small">GitHub / GitLab / local Git</text>
  <text x="185" y="404" text-anchor="middle" class="tiny">Branch, review, tag release</text>

  <rect x="75" y="490" width="220" height="88" rx="8" class="green"/>
  <text x="185" y="520" text-anchor="middle" class="label">Release Tag</text>
  <text x="185" y="544" text-anchor="middle" class="small">v1.x / v2.x / patch</text>
  <text x="185" y="564" text-anchor="middle" class="tiny">Approved source snapshot</text>

  <line x1="185" y1="266" x2="185" y2="330" class="blueLine"/>
  <line x1="185" y1="422" x2="185" y2="490" class="blueLine"/>

  <!-- Validation -->
  <rect x="380" y="100" width="300" height="560" rx="14" class="dashBox"/>
  <text x="530" y="132" text-anchor="middle" class="section">2. Release Validation</text>

  <rect x="420" y="170" width="220" height="72" rx="8" class="purple"/>
  <text x="530" y="200" text-anchor="middle" class="label">Static Checks</text>
  <text x="530" y="224" text-anchor="middle" class="small">PHP syntax, JS/CSS check</text>

  <rect x="420" y="270" width="220" height="76" rx="8" class="purple"/>
  <text x="530" y="300" text-anchor="middle" class="label">Security Checks</text>
  <text x="530" y="324" text-anchor="middle" class="small">Secrets, SQL injection, access</text>

  <rect x="420" y="374" width="220" height="76" rx="8" class="purple"/>
  <text x="530" y="404" text-anchor="middle" class="label">Functional Smoke Test</text>
  <text x="530" y="428" text-anchor="middle" class="small">Login, API, dashboard, reports</text>

  <rect x="420" y="478" width="220" height="84" rx="8" class="orange"/>
  <text x="530" y="508" text-anchor="middle" class="label">Release Package</text>
  <text x="530" y="532" text-anchor="middle" class="small">ZIP / copied files / Git pull</text>
  <text x="530" y="552" text-anchor="middle" class="tiny">PHP application release bundle</text>

  <line x1="295" y1="535" x2="420" y2="520" class="line"/>
  <line x1="530" y1="242" x2="530" y2="270" class="blueLine"/>
  <line x1="530" y1="346" x2="530" y2="374" class="blueLine"/>
  <line x1="530" y1="450" x2="530" y2="478" class="blueLine"/>

  <!-- Deployment environments -->
  <rect x="735" y="100" width="400" height="560" rx="14" class="dashBox"/>
  <text x="935" y="132" text-anchor="middle" class="section">3. Server Deployment</text>

  <rect x="775" y="170" width="320" height="80" rx="8" class="blue"/>
  <text x="935" y="200" text-anchor="middle" class="label">DEV Server</text>
  <text x="935" y="224" text-anchor="middle" class="small">IIS / Apache / Nginx + PHP</text>

  <rect x="775" y="292" width="320" height="80" rx="8" class="green"/>
  <text x="935" y="322" text-anchor="middle" class="label">UAT Server</text>
  <text x="935" y="346" text-anchor="middle" class="small">User acceptance and regression check</text>

  <rect x="775" y="414" width="320" height="80" rx="8" class="orange"/>
  <text x="935" y="444" text-anchor="middle" class="label">Production Server</text>
  <text x="935" y="468" text-anchor="middle" class="small">Approved release deployment</text>

  <rect x="795" y="548" width="280" height="72" rx="8" class="grey"/>
  <text x="935" y="578" text-anchor="middle" class="label">Deployment Methods</text>
  <text x="935" y="602" text-anchor="middle" class="small">Git pull, ZIP upload, Rsync/SFTP, release script</text>

  <line x1="640" y1="520" x2="775" y2="210" class="greenLine"/>
  <line x1="935" y1="250" x2="935" y2="292" class="greenLine"/>
  <line x1="935" y1="372" x2="935" y2="414" class="greenLine"/>
  <line x1="935" y1="494" x2="935" y2="548" class="dashLine"/>
  <text x="1110" y="282" class="note">Promote only after test and approval</text>

  <!-- Operations -->
  <rect x="1190" y="100" width="170" height="560" rx="14" class="dashBox"/>
  <text x="1275" y="132" text-anchor="middle" class="section">4. Operations</text>

  <rect x="1212" y="170" width="126" height="70" rx="8" class="dark"/>
  <text x="1275" y="198" text-anchor="middle" class="white">.env Secrets</text>
  <text x="1275" y="220" text-anchor="middle" class="white">Protected</text>

  <rect x="1212" y="270" width="126" height="70" rx="8" class="dark"/>
  <text x="1275" y="298" text-anchor="middle" class="white">Database</text>
  <text x="1275" y="320" text-anchor="middle" class="white">MySQL</text>

  <rect x="1212" y="370" width="126" height="70" rx="8" class="dark"/>
  <text x="1275" y="398" text-anchor="middle" class="white">Files</text>
  <text x="1275" y="420" text-anchor="middle" class="white">Uploads</text>

  <rect x="1212" y="470" width="126" height="70" rx="8" class="dark"/>
  <text x="1275" y="498" text-anchor="middle" class="white">Logs</text>
  <text x="1275" y="520" text-anchor="middle" class="white">Alerts</text>

  <rect x="1212" y="570" width="126" height="70" rx="8" class="dark"/>
  <text x="1275" y="598" text-anchor="middle" class="white">Backups</text>
  <text x="1275" y="620" text-anchor="middle" class="white">Rollback</text>

  <line x1="1095" y1="210" x2="1212" y2="205" class="line"/>
  <line x1="1095" y1="332" x2="1212" y2="305" class="line"/>
  <line x1="1095" y1="454" x2="1212" y2="405" class="line"/>
  <line x1="1095" y1="454" x2="1212" y2="505" class="line"/>
  <line x1="1095" y1="454" x2="1212" y2="605" class="line"/>

  <!-- Runtime foundation -->
  <rect x="380" y="690" width="755" height="44" rx="8" class="grey"/>
  <text x="758" y="718" text-anchor="middle" class="label">Runtime stack: Web server + PHP + MySQL/MariaDB + JSON configuration + upload/report storage</text>

  <rect x="40" y="700" width="290" height="34" rx="6" class="grey"/>
  <text x="185" y="722" text-anchor="middle" class="tiny">Current SaQshi deployment uses standard PHP web hosting.</text>
</svg>
