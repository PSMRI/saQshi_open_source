<div class="sq-page sq-departments-page">

    <div class="sq-card">

        <div class="sq-card-header">

            <div>

                <h2>Assessment Departments</h2>

                <p>Activate departments for this assessment.</p>

            </div>

        </div>

        <div class="sq-card-body">

            <div class="sq-assessment-summary">

                <div class="sq-summary-item">
                    <label>Assessment</label>
                    <span id="assessmentName">-</span>
                </div>

                <div class="sq-summary-item">
                    <label>Status</label>
                    <span id="assessmentStatus">-</span>
                </div>

                <div class="sq-summary-item">
                    <label>Framework</label>
                    <span id="assessmentFramework">-</span>
                </div>

            </div>

        </div>

    </div>

    <div class="sq-card">

        <div class="sq-card-header">

            <h3>Departments</h3>

        </div>

        <div class="sq-card-body">

            <table class="sq-table">

                <thead>

                    <tr>

                        <th width="60">#</th>

                        <th>Department</th>

                        <th width="120">Concerns</th>

                        <th width="150">Status</th>

                        <th width="180">Action</th>

                    </tr>

                </thead>

                <tbody id="departmentTable">

                    <tr>

                        <td colspan="5" class="sq-text-center">

                            Loading...

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
