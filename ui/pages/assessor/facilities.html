<section class="sq-assessor-page">
    <div class="sq-assessor-toolbar">
        <div>
            <h3>Assigned Facilities</h3>
            <p>Choose the facility where you will perform assessment.</p>
        </div>
        <button class="sq-btn sq-btn-primary" id="assessorDashboardRefresh" type="button">Refresh</button>
    </div>
    <div class="sq-card">
        <div class="sq-card-header">
            <h3>Mapped Facilities</h3>
            <p>Only facilities assigned by state administration are visible.</p>
        </div>
        <div class="sq-card-body" id="assessorFacilityRows"></div>
    </div>
    <div class="sq-assessor-kpis" hidden>
        <div><span>Assigned Facilities</span><strong id="assessorTotalFacilities">0</strong></div>
        <div><span>Active Assignments</span><strong id="assessorActiveMappings">0</strong></div>
        <div><span>Assessor</span><strong id="assessorName">-</strong></div>
    </div>
</section>
