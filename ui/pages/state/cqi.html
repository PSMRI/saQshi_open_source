<!-- SaQshi Open Source | State CQI Monitoring | cqi.html | Version 1.0.0 -->
<section class="sq-state-page">
    <div class="sq-state-toolbar">
        <div>
            <h3>CQI Monitoring</h3>
            <p>Facility-wise CQI action plan status across all assessments.</p>
        </div>
        <div class="sq-state-filters">
            <input type="search" class="sq-form-control" id="stateCqiSearch" placeholder="Search facility or NIN" aria-label="Search Facility Or NIN">
            <button class="sq-btn sq-btn-primary" id="stateCqiRefresh">Refresh</button>
        </div>
    </div>
    <div class="sq-state-kpis">
        <div><span>Facilities With Action Plan</span><strong id="stateCqiTotal">0</strong></div>
        <div><span>Facilities Completed</span><strong id="stateCqiDone">0</strong></div>
        <div><span>Facilities Pending</span><strong id="stateCqiPending">0</strong></div>
        <div><span>Facilities Overdue</span><strong id="stateCqiOverdue">0</strong></div>
    </div>
    <div class="sq-card">
        <div class="sq-card-header">
            <h3>Facility CQI Details</h3>
            <div id="stateCqiPager"></div>
        </div>
        <div class="sq-card-body" id="stateCqiRows"></div>
    </div>
</section>
