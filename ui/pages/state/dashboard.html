<!-- SaQshi Open Source | State Monitoring Dashboard | dashboard.html | Version 1.0.0 -->
<section class="sq-state-page">
    <div class="sq-state-toolbar">
        <div>
            <h3 id="stateMonitoringTitle">State Monitoring Dashboard</h3>
            <p>Monitor certification, assessment, CQI and performance across facilities.</p>
        </div>
        <div class="sq-state-filters">
            <input type="search" class="sq-form-control" id="stateDashboardSearch" placeholder="Search facility or NIN" aria-label="Search Facility Or NIN">
            <button type="button" class="sq-btn sq-btn-primary" id="stateRefresh"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
        </div>
    </div>
    <div class="sq-state-kpis">
        <div><span>Total Facilities</span><strong id="stateTotalFacilities">0</strong></div>
        <div><span>Assessment Started</span><strong id="stateMonthAssessmentStarted">0</strong></div>
        <div><span>Assessment In Progress</span><strong id="stateMonthAssessmentProgress">0</strong></div>
        <div><span>Assessment Completed</span><strong id="stateMonthAssessmentCompleted">0</strong></div>
    </div>
    <div class="sq-state-grid">
        <div class="sq-card"><div class="sq-card-header"><h3>Facility Categories</h3></div><div class="sq-card-body" id="stateFacilityTypes"></div></div>
        <div class="sq-card"><div class="sq-card-header"><h3>Certification Status</h3></div><div class="sq-card-body" id="stateCertification"></div></div>
        <div class="sq-card"><div class="sq-card-header"><h3>Current Month Status</h3></div><div class="sq-card-body" id="statePerformance"></div></div>
    </div>
</section>
