----------------------------------------------------------
Project   : SaQshi Open Source
Component : Confirm Dialog
File      : confirm-dialog.html
License   : MIT
==========================================================

Usage:

SQ.confirmDialog.open({
    title: "Delete Record?",
    message: "Are you sure you want to delete this item?",
    confirmText: "Yes, Delete",
    cancelText: "Cancel",
    type: "danger",
    onConfirm: function () {}
});

==========================================================
-->

<div
    id="sq-confirm-dialog"
    class="sq-confirm-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="sq-confirm-title"
    aria-describedby="sq-confirm-message"
    aria-hidden="true">

    <div
        class="sq-confirm-overlay"
        data-sq-confirm-cancel>
    </div>

    <div class="sq-confirm-window">

        <div
            id="sq-confirm-icon"
            class="sq-confirm-icon sq-confirm-icon-warning"
            aria-hidden="true">

            <i class="bi bi-exclamation-triangle"></i>

        </div>

        <h2
            id="sq-confirm-title"
            class="sq-confirm-title">

            Confirm Action

        </h2>

        <p
            id="sq-confirm-message"
            class="sq-confirm-message">

            Are you sure you want to continue?

        </p>

        <div class="sq-confirm-actions">

            <button
                type="button"
                id="sq-confirm-cancel"
                class="sq-btn sq-btn-light"
                data-sq-confirm-cancel>

                Cancel

            </button>

            <button
                type="button"
                id="sq-confirm-ok"
                class="sq-btn sq-btn-danger"
                data-sq-confirm-ok>

                Confirm

            </button>

        </div>

    </div>

</div>
