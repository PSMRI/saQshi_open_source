<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="SaQshi Healthcare Quality Assessment Platform">

    <title>Login | SaQshi</title>

    <!-- SQ UI Framework -->
    <link rel="stylesheet" href="/ui/assets/css/sq-ui.css?v=20260713-a11y-speech-1">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="icon" type="image/png" href="/ui/assets/images/favicon.png">

</head>

<body class="sq-app sq-auth-app">

    <!-- Root Container -->
    <div id="sq-root"></div>

    <!-- =====================================================
         Core Framework
    ====================================================== -->

    <script src="/ui/assets/js/sq-ui.js"></script>
    <script src="/ui/assets/js/core/storage.js"></script>
    <script src="/ui/assets/js/core/api.js?v=20260718-1"></script>
    <script src="/ui/assets/js/core/auth.js?v=20260710-3"></script>
    <script src="/ui/assets/js/core/validator.js"></script>
    <script src="/ui/assets/js/core/a11y.js?v=20260717-1"></script>
    <script src="/ui/assets/js/core/upload.js"></script>
    <script src="/ui/assets/js/core/router.js?v=20260710-4"></script>
    <script src="/ui/assets/js/core/chat.js"></script>
    <script src="/ui/assets/js/core/component-loader.js?v=20260718-a11y-focus-hover-speech"></script>
    <!-- =====================================================
         Application Bootstrap
    ====================================================== -->

    <script>

        document.addEventListener(

            "DOMContentLoaded",

            async function () {

                try {

                    /*
                    -------------------------------------------------
                    If already authenticated,
                    redirect directly to Dashboard.
                    -------------------------------------------------
                    */

                    if (

                        window.SQ &&
                        SQ.auth &&
                        SQ.auth.isLoggedIn &&
                        SQ.auth.isLoggedIn()

                    ) {

                        window.location.replace(
                            "/ui/dashboard.html"
                        );

                        return;

                    }

                    /*
                    -------------------------------------------------
                    Load Login Module
                    -------------------------------------------------
                    */

                    if (

                        window.SQ &&
                        SQ.router

                    ) {

                        await SQ.router.navigate(
                            "login",
                            {},
                            {
                                history: false,
                                loader: false
                            }
                        );

                    }

                }

                catch (error) {

                    console.error(error);

                    document.getElementById(

                        "sq-root"

                    ).innerHTML = `

                        <div class="sq-alert sq-alert-danger sq-m-5">

                            <div class="sq-alert-content">

                                <div class="sq-alert-title">

                                    Unable to load application

                                </div>

                                <div class="sq-alert-text">

                                    ${error.message}

                                </div>

                            </div>

                        </div>

                    `;

                }

            }

        );

    </script>

</body>

</html>
